name: CI

# Trigger matrix (which paths wake which jobs):
#
#   Path pattern                    | frontend-check | backend-check
#   --------------------------------|----------------|---------------
#   frontend/**                     |      yes       |      no
#   backend/**                      |      no        |      yes
#   .github/workflows/**            |      yes       |      yes   ← shared contract
#   docker-compose*.yml             |      yes       |      yes   ← shared contract
#   docs/**, *.md, ISSUE_TEMPLATE   |      no        |      no    ← docs-only, safe to skip

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      shared: ${{ steps.filter.outputs.shared }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
            backend:
              - 'backend/**'
            shared:
              - '.github/workflows/**'
              - 'docker-compose*.yml'

  frontend-check:
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true' || needs.detect-changes.outputs.shared == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 10.16.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - run: pnpm install

      - run: pnpm audit --audit-level=high || true

      - run: pnpm check

      - run: pnpm build

  backend-check:
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.shared == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: astral-sh/setup-uv@v7

      - run: uv sync --group dev --locked

      - run: uv run pip-audit --desc || true

      - run: uv run ruff check .

      - run: uv run ruff format --check .
